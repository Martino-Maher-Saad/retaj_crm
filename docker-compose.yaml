services:
  n8n:
    image: n8nio/n8n:latest
    container_name: retaj_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - N8N_EDITOR_BASE_URL=https://uneffeminate-carlotta-unelliptical.ngrok-free.dev
      - WEBHOOK_URL=https://uneffeminate-carlotta-unelliptical.ngrok-free.dev
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
    volumes:
      - D:/retaj_automation/n8n_data:/home/node/.n8n

  flowise:
    image: flowiseai/flowise:latest
    container_name: retaj_flowise
    restart: always
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - TOOL_NODE_BUILTIN_MODULES=http,https
    volumes:
      - D:/retaj_automation/flowise_data:/root/.flowise

  redis:
    image: redis:alpine
    container_name: retaj_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - D:/retaj_automation/redis_data:/data

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: retaj_evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=RetajSecretKey123
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - DATABASE_CONNECTION_TYPE=postgresql
      - DATABASE_CONNECTION_ENABLED=false
    volumes:
      - D:/retaj_automation/evolution_instances:/evolution/instances
    depends_on:
      - redis
